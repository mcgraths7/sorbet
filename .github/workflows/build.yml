name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Supersede in-flight runs for the same ref (a new push to a PR cancels the old).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Lint styles (Stylelint)
        run: npm run lint:styles

      - name: Build
        run: npm run build
